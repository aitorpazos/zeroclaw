name: Fork Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build (e.g. v0.1.7-a2a.2)"
        required: true
        type: string
      draft:
        description: "Create as draft release"
        required: false
        default: false
        type: boolean

concurrency:
  group: fork-release-${{ inputs.tag }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            artifact: zeroclaw
            use_cross: false
            cross_compiler: ""
            linker_env: ""
            linker: ""
          - os: ubuntu-22.04
            target: aarch64-unknown-linux-gnu
            artifact: zeroclaw
            use_cross: false
            cross_compiler: gcc-aarch64-linux-gnu
            linker_env: CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER
            linker: aarch64-linux-gnu-gcc
          - os: ubuntu-22.04
            target: armv7-unknown-linux-gnueabihf
            artifact: zeroclaw
            use_cross: false
            cross_compiler: gcc-arm-linux-gnueabihf
            linker_env: CARGO_TARGET_ARMV7_UNKNOWN_LINUX_GNUEABIHF_LINKER
            linker: arm-linux-gnueabihf-gcc
          - os: macos-14
            target: aarch64-apple-darwin
            artifact: zeroclaw
            use_cross: false
            cross_compiler: ""
            linker_env: ""
            linker: ""

    steps:
      - name: Checkout tag
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.92.0"
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: fork-release-${{ matrix.target }}

      - name: Install cross-compiler (Linux)
        if: runner.os == 'Linux' && matrix.cross_compiler != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ${{ matrix.cross_compiler }}

      - name: Build release binary
        shell: bash
        run: |
          if [ -n "${{ matrix.linker_env }}" ] && [ -n "${{ matrix.linker }}" ]; then
            export ${{ matrix.linker_env }}=${{ matrix.linker }}
          fi
          cargo build --profile release-fast --locked --target ${{ matrix.target }}

      - name: Package archive
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release-fast
          tar czf ../../../zeroclaw-${{ matrix.target }}.tar.gz ${{ matrix.artifact }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: zeroclaw-${{ matrix.target }}
          path: zeroclaw-${{ matrix.target }}.tar.gz
          retention-days: 7

  publish:
    name: Publish Release
    needs: [build]
    runs-on: ubuntu-22.04
    timeout-minutes: 10
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate checksums
        shell: bash
        run: |
          cd artifacts
          find . -name '*.tar.gz' -exec mv {} . \;
          sha256sum *.tar.gz > SHA256SUMS
          cat SHA256SUMS

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag }}
          prerelease: true
          draft: ${{ inputs.draft }}
          files: |
            artifacts/*.tar.gz
            artifacts/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
